<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin · TourBusNow</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Tiro+Tamil:ital@0;1&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../style.css" />
</head>
<body>
  <header class="hero analytics-hero">
    <div class="hero-bg">
      <div class="hero-pattern"></div>
      <div class="temple-silhouette"></div>
    </div>
    <div class="hero-content">
      <div class="brand-badge">🔧 Admin Panel</div>
      <h1 class="hero-title">
        <span class="title-tamil">TourBusNow</span>
        <span class="title-main">Add New Bus</span>
      </h1>
      <p class="hero-sub">Submit a new bus entry and update the live UI list automatically.</p>
      <a class="btn-search" href="../">← Back to Home</a>
    </div>
  </header>

  <section class="analytics-section">
    <div class="container">
      <div class="analytics-card">
        <h2>Add New Bus</h2>
        <p class="analytics-summary">Fill in the details below. New entries are saved in browser storage and merged into the home bus list.</p>
        <form id="admin-form" class="admin-form">
          <div class="admin-grid">
            <label for="district">Select District
              <select id="district" name="district">
    <option value="">-- Select District --</option>
    <option value="Ariyalur">Ariyalur</option>

    <option value="Erode">Erode</option>
    <option value="Kallakurichi">Kallakurichi</option>
    <option value="Kanchipuram">Kanchipuram</option>
    <option value="Kanniyakumari">Kanniyakumari</option>
    <option value="Karur">Karur</option>
    <option value="Krishnagiri">Krishnagiri</option>
    <option value="Madurai">Madurai</option>
    <option value="Mayiladuthurai">Mayiladuthurai</option>
    <option value="Nagapattinam">Nagapattinam</option>
    <option value="Namakkal">Namakkal</option>
    <option value="Nilgiris">Nilgiris</option>
    <option value="Perambalur">Perambalur</option>
    <option value="Pudukkottai">Pudukkottai</option>

    <option value="Tenkasi">Tenkasi</option>
    <option value="Thanjavur">Thanjavur</option>
    <option value="Theni">Theni</option>
    <option value="Thoothukudi">Thoothukudi</option>
    <option value="Tiruchirappalli">Tiruchirappalli</option>
    <option value="Tirunelveli">Tirunelveli</option>
    <option value="Tirupattur">Tirupattur</option>
    <option value="Tiruppur">Tiruppur</option>
    <option value="Tiruvallur">Tiruvallur</option>
    <option value="Tiruvannamalai">Tiruvannamalai</option>
    <option value="Tiruvarur">Tiruvarur</option>
    <option value="Vellore">Vellore</option>
    <option value="Viluppuram">Viluppuram</option>
    <option value="Virudhunagar">Virudhunagar</option>
</select>
            </label>

            <label>
              District ID
              <label for="district">Select District
              <select id="district" name="district">
    <option value="">-- Select District --</option>
    <option value="Ariyalur">Ariyalur</option>
    <option value="Chengalpattu">Chengalpattu</option>
    <option value="Chennai">Chennai</option>
    <option value="Coimbatore">Coimbatore</option>
    <option value="Cuddalore">Cuddalore</option>

    <option value="Mayiladuthurai">Mayiladuthurai</option>
    <option value="Nagapattinam">Nagapattinam</option>

    <option value="Tiruchirappalli">Tiruchirappalli</option>

            </label>
            <label>
              Bus ID
              <input type="text" id="bus-id" required placeholder="e.g. DPI071" />
            </label>
            <label>
              Operator Name
              <input type="text" id="operator" required placeholder="e.g. New Tour Co." />
            </label>
            <label>
              Bus Type
              <select id="type" required>
              <option value="">All Types</option>
              <option value="Bus">Bus</option>
              <option value="TT">TT Van</option>
              <option value="Coachbus">Coachbus</option>
              <option value="Urbania">Urbania</option>
            </select>
            </label>
            <label>
              Location
              <input type="text" id="location" required placeholder="e.g. Koyambedu Bus Stand" />
            </label>
            <label>
              Contact Phone
              <input type="text" id="contact" required placeholder="e.g. +91 98401 12345" />
            </label>
            <label>
              Email
              <input type="email" id="email" required placeholder="e.g. info@example.com" />
            </label>
            <label>
              Seats
              <input type="number" id="seats" min="1" required placeholder="e.g. 45" />
            </label>
            <label>
              Per Day Rent
              <input type="number" id="rent" min="0" required placeholder="e.g. 12000" />
            </label>
            <label>
              Amenities
              <input type="text" id="amenities" placeholder="Comma separated" />
            </label>
            <label>
              Bus Emoji
              <input type="text" id="bus-image" maxlength="2" placeholder="e.g. 🚌" />
            </label>
            <label>
              Rating
              <input type="number" id="rating" min="0" max="5" step="0.1" placeholder="e.g. 4.5" />
            </label>
            <label class="checkbox-label">
              <input type="checkbox" id="available" checked /> Available
            </label>
            <label class="checkbox-label">
              <input type="checkbox" id="verified" checked /> Verified
            </label>
            <label class="checkbox-label">
              <input type="checkbox" id="paid" checked /> Paid
            </label>
          </div>
          <div class="form-actions">
            <button class="btn-search" type="submit">Save Bus</button>
            <button class="btn-reset" type="button" id="clear-additions">Clear Additions</button>
          </div>
          <div id="admin-status" class="admin-status">Initializing Firebase status...</div>
          <div id="admin-message" class="admin-message"></div>
        </form>
      </div>
    </div>
  </section>

  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
  <script src="../js/firebase-config.js"></script>
  <script src="../js/firebase-services.js"></script>
  <script src="../js/admin.js?v=6"></script>
</body>
</html>
